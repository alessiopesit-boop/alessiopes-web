name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Dominio personalizzato (alessiopes.it) servito dalla root.
      - run: npm run build -- --base-href=/
      # Fallback 404 per GitHub Pages: lo shell CSR avvia Angular e mostra la
      # pagina "non trovata" per qualsiasi URL non prerenderizzato.
      - run: cp dist/alessiopes-web/browser/index.csr.html dist/alessiopes-web/browser/404.html
      # Evita l'elaborazione Jekyll su GitHub Pages.
      - run: touch dist/alessiopes-web/browser/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/alessiopes-web/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
