<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Alessio Pes — Siti web e software su misura per la tua attività</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Realizzo siti web, gestionali e app su misura per piccole attività e P.IVA. Tutto custom, niente WordPress. Dal primo incontro al sito online, sempre io." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    /* Tema persistente applicato prima dell'hydration per evitare il flash. */
    (function () {
      try {
        if (localStorage.getItem('ap-theme') === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
