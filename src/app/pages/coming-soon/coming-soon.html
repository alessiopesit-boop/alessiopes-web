<header class="hero" id="top">
  <div class="hero-glow"></div>
  <div class="hero-grid-fade"></div>
  <div class="wrap" style="position:relative; z-index:2; width:100%; padding:120px 0 70px; text-align:center; display:flex; flex-direction:column; align-items:center;">
    <span class="kicker" style="justify-content:center;">In arrivo</span>
    <h1 style="font-family:var(--mono); font-weight:800; font-size:clamp(30px,4.6vw,52px); letter-spacing:-0.03em; line-height:1.08; margin-top:14px; text-wrap:balance;">{{ label }} <span class="brace">.</span></h1>
    <p style="color:var(--muted); margin-top:18px; max-width:48ch; font-size:clamp(15px,1.6vw,18px); text-wrap:pretty;">Questa sezione sta per arrivare. Nel frattempo dai un'occhiata alla home oppure scrivimi: rispondo io.</p>

    <div class="terminal" style="max-width:520px; width:100%; margin:34px auto 0; text-align:left;">
      <div class="term-bar"><span class="d r"></span><span class="d y"></span><span class="d g"></span><span class="t">alessio&#64;studio: ~/in-lavorazione</span></div>
      <div class="term-body" style="min-height:auto;">
        <div class="line"><span class="dim">alessio&#64;studio:~$ </span><span class="out">build "{{ label }}"</span></div>
        <div class="line dim">in lavorazione…</div>
        <div class="line cm"># sezione in arrivo a breve</div>
        <div class="line"><span class="dim">alessio&#64;studio:~$ </span><span class="cursor-blk blink"></span></div>
      </div>
    </div>

    <div class="hero-cta" style="justify-content:center; margin-top:32px;">
      <a routerLink="/" class="btn btn-primary">Torna alla home <span class="arrow">→</span></a>
      <a routerLink="/contatti" class="btn btn-ghost">Scrivimi</a>
    </div>
  </div>
</header>
