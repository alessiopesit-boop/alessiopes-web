<nav id="nav" [class.scrolled]="scrolled()">
  <div class="wrap nav-inner">
    <a routerLink="/" class="logo"><span class="mark">AP</span> Alessio Pes</a>

    <div class="nav-links">
      @for (l of links; track l.path) {
        <a [routerLink]="l.path" routerLinkActive ariaCurrentWhenActive="page">{{ l.label }}</a>
      }
      <button
        class="theme-toggle"
        type="button"
        (click)="toggleTheme()"
        aria-label="Cambia tema chiaro/scuro"
        title="Tema chiaro/scuro"
      >
        <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.4M12 19.6V22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2 12h2.4M19.6 12H22M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"/></svg>
      </button>
      <a routerLink="/preventivo" class="nav-cta">Preventivo →</a>
    </div>

    <button
      class="nav-burger"
      type="button"
      [class.on]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-label]="menuOpen() ? 'Chiudi il menu' : 'Apri il menu'"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobileMenu"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  <nav class="mobile-menu" id="mobileMenu" [class.open]="menuOpen()" aria-label="Menu di navigazione">
    @for (l of links; track l.path) {
      <a [routerLink]="l.path" routerLinkActive ariaCurrentWhenActive="page">{{ l.label }}</a>
    }
    <a class="mm-cta" routerLink="/preventivo">Preventivo →</a>
  </nav>
</nav>
