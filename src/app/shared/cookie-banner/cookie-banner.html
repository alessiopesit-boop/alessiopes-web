@if (visible()) {
  <div class="cookie" [class.show]="shown()" role="dialog" aria-label="Informativa cookie">
    <p>
      Questo sito usa solo cookie tecnici necessari al funzionamento (es. la scelta del tema).
      Nessun tracciamento pubblicitario. Maggiori dettagli nella
      <a routerLink="/privacy">privacy &amp; cookie policy</a>.
    </p>
    <div class="cookie-actions">
      <button class="btn btn-primary" type="button" (click)="accept()">Ho capito</button>
      <a class="btn btn-ghost" routerLink="/privacy">Leggi l'informativa</a>
    </div>
  </div>
}
